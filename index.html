    <!-- Schema.org JSON-LD - FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Meus dados estão seguros no Meu RH?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutamente. Utilizamos criptografia de ponta a ponta, servidores em território nacional e seguimos rigorosamente todas as diretrizes da LGPD para proteger os dados da sua empresa e colaboradores."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona a integração com a contabilidade?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O Meu RH exporta automaticamente os dados de folha de pagamento em formatos compatíveis com os principais sistemas contábeis do mercado, facilitando o trabalho do seu contador."
          }
        },
        {
          "@type": "Question",
          "name": "Existe contrato de fidelidade?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. Nossos planos são mensais e você pode cancelar a qualquer momento, sem multas ou taxas de cancelamento."
          }
        },
        {
          "@type": "Question",
          "name": "Posso migrar meus dados de outro sistema?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim! Nossa equipe oferece suporte completo para importação de dados, seja via planilhas ou integração direta com sistemas anteriores."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona o período de teste gratuito?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Você pode testar todas as funcionalidades do Meu RH por 3 dias, sem precisar de cartão de crédito. Após o período, escolha o plano ideal para sua empresa."
          }
        },
        {
          "@type": "Question",
          "name": "Qual o suporte oferecido?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oferecemos suporte por e-mail e chat para todos os planos, com atendimento humanizado e tempo de resposta rápido em horário comercial."
          }
        }
      ]
    }
    </script>
